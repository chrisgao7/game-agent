# Game Agent 默认配置

# LLM 配置
llm:
  provider: "openai"
  model: "gpt-3.5-turbo"
  api_key: "${OPENAI_API_KEY}"
  base_url: null
  max_tokens: 512
  temperature: 0.7
  timeout: 10

# 记忆模块
memory:
  short_term_capacity: 20
  long_term_capacity: 1000
  episodic_capacity: 500
  relevance_threshold: 0.3

# 感知模块
perception:
  update_interval: 0.1        # 感知更新间隔(秒)
  perception_radius: 50.0     # 感知半径
  event_buffer_size: 100

# 决策模块
decision:
  strategy: "hybrid"          # hybrid / behavior_tree / state_machine / llm
  decision_interval: 0.5      # 决策间隔(秒)
  max_actions_per_tick: 3

# 行为树
behavior_tree:
  tick_interval: 0.2
  max_depth: 10

# 状态机
state_machine:
  default_state: "idle"
  transition_cooldown: 1.0

# 动态难度调整(DDA)
dda:
  enabled: true
  target_success_rate: 0.6
  adjustment_speed: 0.1
  min_difficulty: 0.2
  max_difficulty: 1.0
  evaluation_window: 10       # 评估窗口(动作数)

# 个性化内容生成
content_generation:
  enabled: true
  quest_templates_per_type: 5
  relationship_thresholds:
    friendly: 50
    hostile: -30

# 性能优化
optimization:
  async_enabled: true
  max_workers: 4
  cache_ttl: 5.0              # 缓存生存时间(秒)
  cache_max_size: 1000
  lod_enabled: true
  performance_budget: 16.67   # 帧预算(ms), 60fps

# 多Agent协作
coordination:
  enabled: true
  max_agents: 50
  communication_range: 100.0
  task_assignment_strategy: "priority"  # priority / round_robin / capability
